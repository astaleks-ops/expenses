<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#5B5FEF"/>
<meta name="application-name" content="Расходы"/>
<meta name="apple-mobile-web-app-title" content="Расходы"/>
<title>Мои Расходы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>
// Generate app icon dynamically
(function(){
  var sizes=[180,192,512];
  sizes.forEach(function(s){
    var c=document.createElement('canvas');c.width=s;c.height=s;
    var x=c.getContext('2d');
    // Background gradient
    var g=x.createLinearGradient(0,0,s,s);
    g.addColorStop(0,'#5B5FEF');g.addColorStop(1,'#4347C4');
    x.beginPath();
    // Rounded rect
    var r=s*0.22;
    x.moveTo(r,0);x.lineTo(s-r,0);x.quadraticCurveTo(s,0,s,r);
    x.lineTo(s,s-r);x.quadraticCurveTo(s,s,s-r,s);
    x.lineTo(r,s);x.quadraticCurveTo(0,s,0,s-r);
    x.lineTo(0,r);x.quadraticCurveTo(0,0,r,0);
    x.closePath();x.fillStyle=g;x.fill();

    // Wallet shape
    var cx=s/2,cy=s*0.46;
    var ww=s*0.52,wh=s*0.36,wr=s*0.06;
    x.beginPath();
    x.moveTo(cx-ww/2+wr,cy-wh/2);
    x.lineTo(cx+ww/2-wr,cy-wh/2);x.quadraticCurveTo(cx+ww/2,cy-wh/2,cx+ww/2,cy-wh/2+wr);
    x.lineTo(cx+ww/2,cy+wh/2-wr);x.quadraticCurveTo(cx+ww/2,cy+wh/2,cx+ww/2-wr,cy+wh/2);
    x.lineTo(cx-ww/2+wr,cy+wh/2);x.quadraticCurveTo(cx-ww/2,cy+wh/2,cx-ww/2,cy+wh/2-wr);
    x.lineTo(cx-ww/2,cy-wh/2+wr);x.quadraticCurveTo(cx-ww/2,cy-wh/2,cx-ww/2+wr,cy-wh/2);
    x.closePath();
    x.fillStyle='rgba(255,255,255,0.95)';x.fill();

    // Card notch on right
    var nw=s*0.14,nh=s*0.14,nr=s*0.03;
    var nx=cx+ww/2-nw,ny=cy-nh/2;
    x.beginPath();
    x.moveTo(cx+ww/2,ny);
    x.lineTo(cx+ww/2,ny+nh);
    x.lineTo(nx+nr,ny+nh);x.quadraticCurveTo(nx,ny+nh,nx,ny+nh-nr);
    x.lineTo(nx,ny+nr);x.quadraticCurveTo(nx,ny,nx+nr,ny);
    x.closePath();
    x.fillStyle='#5B5FEF';x.fill();

    // Small circle in notch
    x.beginPath();
    x.arc(nx+nw*0.45,cy,s*0.028,0,Math.PI*2);
    x.fillStyle='#fff';x.fill();

    // Ruble sign
    x.fillStyle='#5B5FEF';
    x.font='bold '+Math.round(s*0.18)+'px Outfit, sans-serif';
    x.textAlign='center';x.textBaseline='middle';
    x.fillText('₽',cx-s*0.06,cy+s*0.01);

    // Coin at bottom
    var coinX=cx,coinY=s*0.78,coinR=s*0.1;
    x.beginPath();x.arc(coinX,coinY,coinR,0,Math.PI*2);
    x.fillStyle='rgba(255,255,255,0.95)';x.fill();
    x.beginPath();x.arc(coinX,coinY,coinR*0.7,0,Math.PI*2);
    x.strokeStyle='#5B5FEF';x.lineWidth=s*0.015;x.stroke();
    x.fillStyle='#5B5FEF';
    x.font='bold '+Math.round(s*0.09)+'px Outfit, sans-serif';
    x.fillText('₽',coinX,coinY+s*0.005);

    var url=c.toDataURL('image/png');
    if(s===180){
      var l=document.createElement('link');l.rel='apple-touch-icon';l.href=url;document.head.appendChild(l);
    }
    if(s===192){
      var l2=document.createElement('link');l2.rel='icon';l2.type='image/png';l2.sizes='192x192';l2.href=url;document.head.appendChild(l2);
    }
    // Manifest
    if(s===192){
      var manifest={name:'Мои Расходы',short_name:'Расходы',start_url:'.',display:'standalone',background_color:'#111318',theme_color:'#5B5FEF',icons:[{src:url,sizes:'192x192',type:'image/png'}]};
      var blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
      var ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);
    }
  });
})();
</script>
<style>
:root{
  --font-d:'Outfit',sans-serif;--font-b:'Nunito',sans-serif;
  --bg:#F0F1F5;--card:#FFF;--nav:rgba(255,255,255,.9);
  --tx:#1A1D26;--dim:#8B8FA3;--ac:#5B5FEF;--acd:#4347C4;
  --brd:#E2E4EC;--chip:#F4F5F9;--sh:0 2px 12px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111318;--card:#1C1E27;--nav:rgba(28,30,39,.92);
  --tx:#E8E9EF;--dim:#6B6F82;--ac:#7B7FFF;--acd:#5B5FEF;
  --brd:#2A2D38;--chip:#252731;--sh:0 2px 12px rgba(0,0,0,.25);
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-b);background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=date]{color-scheme:light dark}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 110px;height:calc(100vh - 56px)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;justify-content:space-around;padding:6px 0 max(8px,env(safe-area-inset-bottom));border-top:1px solid var(--brd);z-index:100}
nav button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;font-size:20px;transition:color .2s;color:var(--dim)}
nav button.on{color:var(--ac);font-weight:700}
nav button span.lb{font-size:10px;letter-spacing:.02em}
.card{background:var(--card);border-radius:20px;padding:18px 16px;margin-bottom:14px;box-shadow:var(--sh)}
.lbl{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
h2{font-family:var(--font-d);font-size:26px;margin:0 0 20px;color:var(--tx)}
.chip{border-radius:14px;padding:8px 14px;font-size:14px;cursor:pointer;border:2px solid transparent;background:var(--chip);color:var(--tx);display:flex;align-items:center;gap:6px;transition:all .2s}
.chip.on{font-weight:600}
.inp{display:block;width:100%;padding:10px 0;background:none;border:none;border-bottom:1px solid var(--brd);outline:none;font-size:16px;color:var(--tx);font-family:var(--font-b)}
.btn{width:100%;padding:16px;border:none;border-radius:16px;background:var(--ac);color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:var(--font-d);transition:background .3s,transform .15s}
.btn:active{transform:scale(.97)}
.btn.ok{background:#27AE60;transform:scale(1.03)}
.row{display:flex;align-items:center;gap:12px}
.ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.del{background:none;border:none;font-size:16px;cursor:pointer;color:var(--dim);padding:4px;opacity:.4}
.empty{text-align:center;color:var(--dim);padding:50px 0}
.empty .big{font-size:48px;margin-bottom:14px}
.bar-track{height:6px;background:var(--chip);border-radius:3px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.nav-sel{display:flex;align-items:center;justify-content:space-between}
.nav-sel button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tx);padding:4px 8px}
.total-card{background:linear-gradient(135deg,var(--ac),var(--acd));border-radius:20px;padding:24px 20px;margin-bottom:18px;color:#fff}
.total-card .big{font-size:36px;font-weight:700;font-family:var(--font-d);margin-top:6px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.emoji-btn{width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;border:2px solid transparent;background:var(--chip);display:flex;align-items:center;justify-content:center}
.emoji-btn.on{border-color:var(--ac);background:rgba(91,95,239,.1)}
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.color-btn{width:30px;height:30px;border-radius:15px;cursor:pointer;border:3px solid transparent;transition:border .2s}
.color-btn.on{border-color:var(--tx)}
.add-cat-btn{width:100%;padding:14px;border:2px dashed var(--brd);border-radius:16px;background:none;color:var(--dim);font-size:15px;cursor:pointer}
.period-tabs{display:flex;gap:4px;background:var(--chip);border-radius:14px;padding:4px;margin-bottom:14px}
.period-tab{flex:1;padding:10px 0;border:none;border-radius:11px;font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:var(--dim);transition:all .2s;font-family:var(--font-b)}
.period-tab.on{background:var(--card);color:var(--tx);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.compare{display:flex;gap:10px;margin-bottom:14px}
.compare-card{flex:1;background:var(--card);border-radius:16px;padding:14px 12px;box-shadow:var(--sh);text-align:center}
.compare-card .val{font-size:18px;font-weight:700;font-family:var(--font-d);margin-top:4px}
.compare-card .sub{font-size:11px;margin-top:2px}
.trend-up{color:#E74C3C}
.trend-down{color:#27AE60}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s}
.chart-row{display:flex;align-items:center;gap:10px}
.pie-legend{display:flex;flex-direction:column;gap:6px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.pie-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.bars{display:flex;align-items:flex-end;gap:2px;height:120px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar-rect{width:100%;min-width:3px;background:var(--ac);border-radius:2px 2px 0 0;transition:height .4s}
.bar-label{font-size:8px;color:var(--dim);margin-top:4px;text-align:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const LS_EXP='exp-tracker-expenses',LS_CAT='exp-tracker-categories';
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_SHORT=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const DAYS_SHORT=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const EMOJIS=["🍕","🚌","🏠","🎬","💊","👕","📦","☕","🎮","📱","✈️","🎓","💇","🐾","🎁","💡","🔧","📚","🏋️","🛒"];
const COLORS=["#FF6B6B","#4ECDC4","#45B7D1","#F7DC6F","#82E0AA","#BB8FCE","#AEB6BF","#F0B27A","#E74C3C","#5DADE2","#58D68D","#AF7AC5"];
const DEFAULT_CATS=[
  {id:"food",name:"Еда",emoji:"🍕",color:"#FF6B6B"},
  {id:"transport",name:"Транспорт",emoji:"🚌",color:"#4ECDC4"},
  {id:"home",name:"Жильё",emoji:"🏠",color:"#45B7D1"},
  {id:"fun",name:"Развлечения",emoji:"🎬",color:"#F7DC6F"},
  {id:"health",name:"Здоровье",emoji:"💊",color:"#82E0AA"},
  {id:"clothes",name:"Одежда",emoji:"👕",color:"#BB8FCE"},
  {id:"other",name:"Прочее",emoji:"📦",color:"#AEB6BF"},
];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmt(n){return n.toLocaleString('ru-RU')+' ₽'}
function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch(e){return fb}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

let expenses=load(LS_EXP,[]);
let categories=load(LS_CAT,DEFAULT_CATS);
let tab='add';
let statsPeriod='month';
let statsMonth=new Date().getMonth(),statsYear=new Date().getFullYear();
let statsWeekStart=getMonday(new Date());
let catAdding=false,catName='',catEmoji='📦',catColor='#FF6B6B';
let addCat=categories[0]?.id||'';
let addNote='',addAmount='',addDate=new Date().toISOString().slice(0,10);
let successTimer=null,shakeTimer=null,showSuccess=false,showShake=false;

function persist(){save(LS_EXP,expenses);save(LS_CAT,categories)}
function catMap(){const m={};categories.forEach(c=>m[c.id]=c);return m}
function getMonday(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);dt.setHours(0,0,0,0);return dt}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function dateStr(d){return d.toISOString().slice(0,10)}
function isLeap(y){return(y%4===0&&y%100!==0)||y%400===0}

function getFiltered(){
  if(statsPeriod==='week'){const s=dateStr(statsWeekStart),e=dateStr(addDays(statsWeekStart,6));return expenses.filter(x=>x.date>=s&&x.date<=e)}
  if(statsPeriod==='month') return expenses.filter(x=>{const d=new Date(x.date+'T00:00:00');return d.getMonth()===statsMonth&&d.getFullYear()===statsYear});
  return expenses.filter(x=>new Date(x.date+'T00:00:00').getFullYear()===statsYear);
}
function getPrevFiltered(){
  if(statsPeriod==='week'){const ps=addDays(statsWeekStart,-7),s=dateStr(ps),e=dateStr(addDays(ps,6));return expenses.filter(x=>x.date>=s&&x.date<=e)}
  if(statsPeriod==='month'){let pm=statsMonth-1,py=statsYear;if(pm<0){pm=11;py--}return expenses.filter(x=>{const d=new Date(x.date+'T00:00:00');return d.getMonth()===pm&&d.getFullYear()===py})}
  return expenses.filter(x=>new Date(x.date+'T00:00:00').getFullYear()===statsYear-1);
}
function getPeriodLabel(){
  if(statsPeriod==='week'){const e=addDays(statsWeekStart,6);return `${statsWeekStart.getDate()} ${MONTHS_SHORT[statsWeekStart.getMonth()]} — ${e.getDate()} ${MONTHS_SHORT[e.getMonth()]}`}
  if(statsPeriod==='month') return `${MONTHS[statsMonth]} ${statsYear}`;
  return `${statsYear} год`;
}
function navPeriod(dir){
  if(statsPeriod==='week') statsWeekStart=addDays(statsWeekStart,dir*7);
  else if(statsPeriod==='month'){statsMonth+=dir;if(statsMonth>11){statsMonth=0;statsYear++}if(statsMonth<0){statsMonth=11;statsYear--}}
  else statsYear+=dir;
}

function render(){
  let html='';
  if(tab==='add') html=renderAdd();
  else if(tab==='list') html=renderList();
  else if(tab==='stats') html=renderStats();
  else if(tab==='cats') html=renderCats();
  const items=[{id:'add',icon:'＋',lb:'Добавить'},{id:'list',icon:'☰',lb:'История'},{id:'stats',icon:'◔',lb:'Анализ'},{id:'cats',icon:'⚙',lb:'Категории'}];
  html+=`<nav>${items.map(i=>`<button class="${tab===i.id?'on':''}" data-tab="${i.id}"><span>${i.icon}</span><span class="lb">${i.lb}</span></button>`).join('')}</nav>`;
  $('#app').innerHTML=html;
  bind();
}

function renderAdd(){
  let chips=categories.map(c=>{const on=addCat===c.id;return `<button class="chip${on?' on':''}" data-cat="${c.id}" style="${on?`background:${c.color}22;border-color:${c.color};color:${c.color}`:''}">${c.emoji} ${c.name}</button>`}).join('');
  return `<div class="scroll"><h2>Новый расход</h2>
    <div class="card${showShake?' shake':''}" style="padding:24px 20px"><div class="lbl">Сумма</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-top:8px">
        <input type="number" inputmode="decimal" placeholder="0" id="iAmt" value="${addAmount}" style="background:none;border:none;outline:none;font-size:42px;font-weight:700;font-family:var(--font-d);color:var(--tx);width:100%"/>
        <span style="font-size:28px;color:var(--dim);font-weight:300">₽</span></div></div>
    <div class="card"><div class="lbl">Категория</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">${chips}</div></div>
    <div class="card" style="display:flex;flex-direction:column;gap:14px">
      <div><div class="lbl">Заметка</div><input class="inp" type="text" placeholder="Необязательно" id="iNote" value="${addNote.replace(/"/g,'&quot;')}"/></div>
      <div><div class="lbl">Дата</div><input class="inp" type="date" id="iDate" value="${addDate}"/></div></div>
    <button class="btn${showSuccess?' ok':''}" id="bAdd">${showSuccess?'✓ Добавлено!':'Добавить расход'}</button></div>`;
}

function renderList(){
  const cm=catMap();
  if(!expenses.length) return `<div class="scroll"><h2>История</h2><div class="empty"><div class="big">📝</div><p style="font-size:16px">Пока нет расходов</p></div></div>`;
  const sorted=[...expenses].sort((a,b)=>b.date.localeCompare(a.date));
  const groups={};sorted.forEach(e=>{if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e)});
  const today=new Date();today.setHours(0,0,0,0);const yest=new Date(today);yest.setDate(yest.getDate()-1);
  let html='<div class="scroll"><h2>История</h2>';
  Object.entries(groups).forEach(([date,items])=>{
    const d=new Date(date+'T00:00:00');
    let label=d.getTime()===today.getTime()?'Сегодня':d.getTime()===yest.getTime()?'Вчера':d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
    const dTotal=items.reduce((s,e)=>s+e.amount,0);
    html+=`<div style="margin-bottom:20px"><div class="lbl" style="font-weight:600;margin-bottom:10px">${label} — ${fmt(dTotal)}</div>`;
    items.forEach(e=>{
      const c=cm[e.catId]||{emoji:'❓',name:'?',color:'#999'};
      html+=`<div class="card row" style="padding:14px 16px"><div class="ico" style="background:${c.color}20">${c.emoji}</div>
        <div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:500">${c.name}</div>${e.note?`<div style="font-size:13px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.note}</div>`:''}</div>
        <div style="font-size:16px;font-weight:600;white-space:nowrap">${fmt(e.amount)}</div>
        <button class="del" data-del="${e.id}">✕</button></div>`;
    });html+='</div>';
  });
  return html+'</div>';
}

function renderStats(){
  const cm=catMap();const me=getFiltered(),prevMe=getPrevFiltered();
  const total=me.reduce((s,e)=>s+e.amount,0);const prevTotal=prevMe.reduce((s,e)=>s+e.amount,0);
  const diff=prevTotal?Math.round((total-prevTotal)/prevTotal*100):0;
  const days=statsPeriod==='week'?7:statsPeriod==='month'?new Date(statsYear,statsMonth+1,0).getDate():(isLeap(statsYear)?366:365);
  const avgDay=total/days;
  const periodName=statsPeriod==='week'?'за неделю':statsPeriod==='month'?'за месяц':'за год';
  const prevLabel=statsPeriod==='week'?'Пред. неделя':statsPeriod==='month'?'Пред. месяц':'Пред. год';

  let html=`<div class="scroll"><h2>Анализ</h2>
    <div class="period-tabs">
      <button class="period-tab${statsPeriod==='week'?' on':''}" data-period="week">Неделя</button>
      <button class="period-tab${statsPeriod==='month'?' on':''}" data-period="month">Месяц</button>
      <button class="period-tab${statsPeriod==='year'?' on':''}" data-period="year">Год</button></div>
    <div class="card nav-sel"><button id="pp">‹</button><span style="font-size:16px;font-weight:600">${getPeriodLabel()}</span><button id="np">›</button></div>
    <div class="total-card"><div style="font-size:13px;opacity:.8;text-transform:uppercase;letter-spacing:.08em">Итого ${periodName}</div><div class="big">${fmt(total)}</div><div style="font-size:13px;opacity:.7;margin-top:4px">${me.length} операций</div></div>`;

  let trendHtml='';
  if(prevTotal>0){const cls=diff>0?'trend-up':'trend-down';const ar=diff>0?'↑':'↓';trendHtml=`<div class="sub ${cls}">${ar} ${Math.abs(diff)}%</div>`}
  html+=`<div class="compare">
    <div class="compare-card"><div class="lbl">Ср. в день</div><div class="val">${fmt(Math.round(avgDay))}</div></div>
    <div class="compare-card"><div class="lbl">${prevLabel}</div><div class="val">${fmt(prevTotal)}</div>${trendHtml}</div></div>`;

  if(!total) return html+`<div class="empty"><div class="big">📊</div><p>Нет данных за этот период</p></div></div>`;

  const byC={};me.forEach(e=>{byC[e.catId]=(byC[e.catId]||0)+e.amount});
  const catData=Object.entries(byC).map(([id,v])=>({id,value:v,name:cm[id]?.name||'?',color:cm[id]?.color||'#999',emoji:cm[id]?.emoji||'?',pct:Math.round(v/total*100)})).sort((a,b)=>b.value-a.value);

  let pie='',angle=0;
  catData.forEach(c=>{
    const sw=c.pct/100*360,lg=sw>180?1:0,r=60,cx=70,cy=70;
    const sR=(angle-90)*Math.PI/180,eR=((angle+sw)-90)*Math.PI/180;
    const x1=cx+r*Math.cos(sR),y1=cy+r*Math.sin(sR),x2=cx+r*Math.cos(eR),y2=cy+r*Math.sin(eR);
    if(sw>=359.9) pie+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c.color}"/>`;
    else pie+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} Z" fill="${c.color}"/>`;
    angle+=sw;
  });
  pie+=`<circle cx="70" cy="70" r="34" fill="var(--card)"/>`;
  let legend=catData.map(c=>`<div class="pie-legend-item"><div class="pie-dot" style="background:${c.color}"></div><span style="flex:1">${c.emoji} ${c.name}</span><span style="color:var(--dim);font-weight:500">${c.pct}%</span></div>`).join('');
  html+=`<div class="card"><div class="lbl" style="margin-bottom:8px">По категориям</div><div class="chart-row"><svg viewBox="0 0 140 140" width="140" height="140">${pie}</svg><div class="pie-legend" style="flex:1">${legend}</div></div></div>`;

  let barData=[],barTitle='';
  if(statsPeriod==='week'){barTitle='По дням недели';for(let i=0;i<7;i++){const ds=dateStr(addDays(statsWeekStart,i));const t=me.filter(e=>e.date===ds).reduce((s,e)=>s+e.amount,0);barData.push({label:DAYS_SHORT[i],total:t})}}
  else if(statsPeriod==='month'){barTitle='По дням';const dim=new Date(statsYear,statsMonth+1,0).getDate();for(let i=1;i<=dim;i++){const t=me.filter(e=>new Date(e.date+'T00:00:00').getDate()===i).reduce((s,e)=>s+e.amount,0);barData.push({label:i,total:t})}}
  else{barTitle='По месяцам';for(let i=0;i<12;i++){const t=me.filter(e=>new Date(e.date+'T00:00:00').getMonth()===i).reduce((s,e)=>s+e.amount,0);barData.push({label:MONTHS_SHORT[i],total:t})}}
  const maxD=Math.max(...barData.map(d=>d.total),1);
  const showEvery=statsPeriod==='month'?Math.ceil(barData.length/10):1;
  let bars=barData.map((d,i)=>{const h=d.total?Math.max(4,d.total/maxD*100):0;const sl=statsPeriod==='month'?((i%showEvery===0)||(i===barData.length-1)):true;return `<div class="bar-col"><div class="bar-rect" style="height:${h}%"></div>${sl?`<div class="bar-label">${d.label}</div>`:''}</div>`}).join('');
  html+=`<div class="card"><div class="lbl" style="margin-bottom:10px">${barTitle}</div><div class="bars">${bars}</div></div>`;

  html+=`<div class="card"><div class="lbl" style="margin-bottom:14px">Топ расходов</div>`;
  catData.forEach(c=>{html+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:14px">${c.emoji} ${c.name}</span><span style="font-size:14px;font-weight:600">${fmt(c.value)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${c.pct}%;background:${c.color}"></div></div></div>`});
  html+='</div></div>';
  return html;
}

function renderCats(){
  let list=categories.map(c=>`<div class="card row" style="padding:14px 16px"><div class="ico" style="background:${c.color}20">${c.emoji}</div><div style="flex:1;font-size:15px;font-weight:500">${c.name}</div><div style="width:12px;height:12px;border-radius:6px;background:${c.color};flex-shrink:0"></div><button class="del" data-delcat="${c.id}">✕</button></div>`).join('');
  let html=`<div class="scroll"><h2>Категории</h2>${list}`;
  if(!catAdding){html+=`<button class="add-cat-btn" id="bNewCat">＋ Добавить категорию</button>`}
  else{
    let emojis=EMOJIS.map(e=>`<button class="emoji-btn${catEmoji===e?' on':''}" data-em="${e}">${e}</button>`).join('');
    let colors=COLORS.map(c=>`<button class="color-btn${catColor===c?' on':''}" data-col="${c}" style="background:${c}"></button>`).join('');
    html+=`<div class="card">
      <input class="inp" type="text" placeholder="Название" id="iCatName" value="${catName.replace(/"/g,'&quot;')}" autofocus/>
      <div style="margin-top:14px"><div class="lbl">Эмодзи</div><div class="emoji-grid">${emojis}</div></div>
      <div style="margin-top:14px"><div class="lbl">Цвет</div><div class="color-grid">${colors}</div></div>
      <div style="display:flex;gap:10px;margin-top:18px">
        <button class="btn" id="bCatCancel" style="background:none;border:1px solid var(--brd);color:var(--dim);flex:1">Отмена</button>
        <button class="btn" id="bCatSave" style="flex:1">Сохранить</button></div></div>`;
  }
  return html+'</div>';
}

function bind(){
  $$('nav button').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});
  if(tab==='add'){
    const iA=$('#iAmt'),iN=$('#iNote'),iD=$('#iDate');
    if(iA){iA.oninput=()=>{addAmount=iA.value};iA.focus()}
    if(iN) iN.oninput=()=>{addNote=iN.value};
    if(iD) iD.onchange=()=>{addDate=iD.value};
    $$('[data-cat]').forEach(b=>b.onclick=()=>{addCat=b.dataset.cat;render()});
    const bA=$('#bAdd');
    if(bA) bA.onclick=()=>{
      const v=parseFloat(addAmount.replace(',','.'));
      if(!v||v<=0||!addCat){showShake=true;render();clearTimeout(shakeTimer);shakeTimer=setTimeout(()=>{showShake=false;render()},500);return}
      expenses.unshift({id:uid(),amount:v,catId:addCat,note:addNote,date:addDate});
      persist();addAmount='';addNote='';addDate=new Date().toISOString().slice(0,10);
      showSuccess=true;render();clearTimeout(successTimer);successTimer=setTimeout(()=>{showSuccess=false;render()},1200);
    };
  }
  if(tab==='list') $$('[data-del]').forEach(b=>b.onclick=()=>{expenses=expenses.filter(e=>e.id!==b.dataset.del);persist();render()});
  if(tab==='stats'){
    $$('[data-period]').forEach(b=>b.onclick=()=>{statsPeriod=b.dataset.period;render()});
    const pp=$('#pp'),np=$('#np');
    if(pp) pp.onclick=()=>{navPeriod(-1);render()};
    if(np) np.onclick=()=>{navPeriod(1);render()};
  }
  if(tab==='cats'){
    $$('[data-delcat]').forEach(b=>b.onclick=()=>{categories=categories.filter(c=>c.id!==b.dataset.delcat);persist();render()});
    const bN=$('#bNewCat');if(bN) bN.onclick=()=>{catAdding=true;catName='';catEmoji='📦';catColor='#FF6B6B';render()};
    $$('[data-em]').forEach(b=>b.onclick=()=>{catEmoji=b.dataset.em;render()});
    $$('[data-col]').forEach(b=>b.onclick=()=>{catColor=b.dataset.col;render()});
    const iC=$('#iCatName');if(iC) iC.oninput=()=>{catName=iC.value};
    const bCa=$('#bCatCancel');if(bCa) bCa.onclick=()=>{catAdding=false;render()};
    const bS=$('#bCatSave');if(bS) bS.onclick=()=>{
      if(!catName.trim()) return;
      categories.push({id:uid(),name:catName.trim(),emoji:catEmoji,color:catColor});
      persist();catAdding=false;render();
    };
  }
}
render();
</script>
</body>
</html>
